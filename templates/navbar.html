<nav class="navbar navbar-expand-lg navbar-dark app-navbar shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-semibold" href="{% url 'dashboard' %}">
            <i class="fas fa-shipping-fast me-2"></i>Encomiendas
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/' or request.path == '/dashboard/' %}active{% endif %}" href="{% url 'dashboard' %}">
                        Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if '/encomiendas' in request.path %}active{% endif %}" href="{% url 'encomienda_lista' %}">
                        Encomiendas
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'encomienda_crear' %}">
                        Nueva
                    </a>
                </li>
            </ul>

            <ul class="navbar-nav ms-auto align-items-lg-center">
                {% if user.is_authenticated %}
                    <li class="nav-item me-lg-3 small text-white-50">
                        <i class="bi bi-person-fill me-1"></i>{{ user.username }}
                    </li>
                    <li class="nav-item">
                        <form action="{% url 'logout' %}" method="post" class="d-inline">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-outline-light btn-sm px-3">
                                <i class="bi bi-box-arrow-right me-1"></i>Salir
                            </button>
                        </form>
                    </li>
                {% else %}
                    <li class="nav-item">
                        <a class="btn btn-outline-light btn-sm px-3" href="{% url 'login' %}">
                            <i class="bi bi-box-arrow-in-right me-1"></i>Iniciar sesion
                        </a>
                    </li>
                {% endif %}
            </ul>
        </div>
    </div>
</nav>
